<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Online Auction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div th:replace="fragments/navbar :: navbar"></div>
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1>Active Auctions</h1>
      <a class="btn btn-primary" th:href="@{/seller/auctions/new}" sec:authorize="hasRole('SELLER')">New Auction</a>
    </div>
    <div class="row" th:if="${auctions} != null">
      <div class="col-md-4 mb-3" th:each="a : ${auctions}">
        <div class="card h-100">
          <img th:if="${a.imageUrl != null}" th:src="${a.imageUrl}" class="card-img-top" alt="Image" />
          <div class="card-body">
            <h5 class="card-title" th:text="${a.title}"></h5>
            <p class="card-text" th:text="${#strings.abbreviate(a.description, 100)}"></p>
            <p><strong>Ends:</strong> <span th:text="${#temporals.format(a.endTime, 'yyyy-MM-dd HH:mm')}"></span></p>
            <a class="btn btn-outline-primary" th:href="@{'/auction/' + ${a.id}}">View</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
