<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New Auction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div th:replace="fragments/navbar :: navbar"></div>
  <div class="container" style="max-width: 720px;">
    <h1>New Auction</h1>
    <form th:action="@{/seller/auctions}" th:object="${form}" method="post" enctype="multipart/form-data">
      <div class="mb-3"><label class="form-label">Title</label><input class="form-control" th:field="*{title}" required /></div>
      <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" th:field="*{description}" rows="5"></textarea></div>
      <div class="row g-3">
        <div class="col-md-4"><label class="form-label">Starting Price</label><input class="form-control" th:field="*{startingPrice}" type="number" step="0.01" required /></div>
        <div class="col-md-4"><label class="form-label">Reserve Price</label><input class="form-control" th:field="*{reservePrice}" type="number" step="0.01" required /></div>
        <div class="col-md-4"><label class="form-label">End Time</label><input class="form-control" th:field="*{endTime}" type="datetime-local" required /></div>
      </div>
      <div class="mb-3 mt-3"><label class="form-label">Image</label><input class="form-control" type="file" name="image" /></div>
      <button class="btn btn-primary" type="submit">Submit</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
