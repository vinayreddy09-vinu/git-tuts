<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auction Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div th:replace="fragments/navbar :: navbar"></div>
  <div class="container" th:with="a=${auction}">
    <div class="row">
      <div class="col-md-6">
        <img th:if="${a.imageUrl != null}" th:src="${a.imageUrl}" class="img-fluid" alt="Image"/>
      </div>
      <div class="col-md-6">
        <h1 th:text="${a.title}"></h1>
        <p th:text="${a.description}"></p>
        <p><strong>Ends:</strong> <span th:text="${#temporals.format(a.endTime, 'yyyy-MM-dd HH:mm')}"></span></p>
        <p><strong>Starting price:</strong> <span th:text="${a.startingPrice}"></span></p>
        <div id="currentPrice" class="alert alert-info">Waiting for bids...</div>
        <div th:if="${param.bidSuccess}" class="alert alert-success">Bid placed successfully!</div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{'/auction/' + ${a.id} + '/bid'}" method="post" th:object="${bidForm}" sec:authorize="hasRole('BUYER')">
          <div class="input-group mb-3">
            <input class="form-control" th:field="*{amount}" type="number" step="0.01" placeholder="Your bid" required />
            <button class="btn btn-primary" type="submit">Place Bid</button>
          </div>
        </form>
        <div class="alert alert-warning" sec:authorize="!hasRole('BUYER')">
          Login as BUYER to place bids.
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <script>
    const auctionId = /*[[${auction.id}]]*/ '0';
  </script>
  <script src="/js/ws.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
