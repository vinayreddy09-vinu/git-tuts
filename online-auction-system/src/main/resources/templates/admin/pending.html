<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pending Approvals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div th:replace="fragments/navbar :: navbar"></div>
  <div class="container">
    <h1>Pending Auctions</h1>
    <table class="table table-striped">
      <thead>
        <tr><th>Title</th><th>Seller</th><th>Ends</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr th:each="a : ${auctions}">
          <td th:text="${a.title}"></td>
          <td th:text="${a.seller.username}"></td>
          <td th:text="${#temporals.format(a.endTime, 'yyyy-MM-dd HH:mm')}"></td>
          <td>
            <form th:action="@{'/admin/approve/' + ${a.id}}" method="post">
              <button class="btn btn-success btn-sm">Approve</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
