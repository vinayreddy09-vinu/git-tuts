spring.application.name=Online Auction System
server.port=8080

# H2 console and datasource
spring.datasource.url=jdbc:h2:mem:auctiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Multipart for image upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
auction.upload.dir=uploads

# WebSocket (allow all origins for dev)
auction.websocket.allowed-origins=*

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.auction=DEBUG