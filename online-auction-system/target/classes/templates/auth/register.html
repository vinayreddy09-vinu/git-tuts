<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div th:replace="fragments/navbar :: navbar"></div>
  <div class="container" style="max-width: 480px;">
    <h1>Register</h1>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form method="post" th:action="@{/register}" th:object="${form}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" th:field="*{username}" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" th:field="*{email}" />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" th:field="*{password}" type="password" required />
      </div>
      <button class="btn btn-primary" type="submit">Create account</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
